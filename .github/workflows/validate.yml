name: Validate Benchmark

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build active benchmark artifacts
        run: |
          make build-sgs100
          make build-sgs152
      - name: Validate mini-benchmark 0.5.0 dataset
        run: make validate
      - name: Validate SGS-Hard-50 diagnostic set
        run: make validate-hard50
      - name: Lint benchmark docs and metadata
        run: |
          make lint
          make lint-sgs100
      - name: Run local 0.5.0 demo
        run: make demo
      - name: Regenerate report
        run: make report
      - name: Score bundled final MCQ outputs
        run: |
          make score-mcq
          make score-hard50-all
          make eval-free-response
          make score-free-response
