<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="430" viewBox="0 0 1400 430" role="img" aria-labelledby="title desc">
<title id="title">SGS benchmark evaluation flow</title>
<desc id="desc">The evaluation freezes datasets, runs models once without tools, scores each layer separately, and audits hashes and item-level errors.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker></defs>
<rect width="1400" height="430" rx="28" fill="#f8fafc"/>
<text x="55" y="62" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Evaluation flow</text>
<text x="55" y="96" font-family="Arial, sans-serif" font-size="18" fill="#475569">Comparable inputs, separated scores, traceable evidence</text>
<line x1="265" y1="230" x2="307" y2="230" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="535" y1="230" x2="577" y2="230" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="805" y1="230" x2="847" y2="230" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="1075" y1="230" x2="1117" y2="230" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="55" y="145" width="210" height="170" rx="20" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
<text x="73" y="190" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0f172a">1  Freeze</text>
<text x="73" y="235" font-family="Arial, sans-serif" font-size="16" fill="#334155">SGS152 + diagnostic sets</text>
<text x="73" y="268" font-family="Arial, sans-serif" font-size="16" fill="#334155">task and prompt hashes</text>
<rect x="325" y="145" width="210" height="170" rx="20" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<text x="343" y="190" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0f172a">2  Run</text>
<text x="343" y="235" font-family="Arial, sans-serif" font-size="16" fill="#334155">single sample · temp 0</text>
<text x="343" y="268" font-family="Arial, sans-serif" font-size="16" fill="#334155">no internet or tools</text>
<rect x="595" y="145" width="210" height="170" rx="20" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<text x="613" y="190" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0f172a">3  Score</text>
<text x="613" y="235" font-family="Arial, sans-serif" font-size="16" fill="#334155">MCQ exact match</text>
<text x="613" y="268" font-family="Arial, sans-serif" font-size="16" fill="#334155">FR: GPT-5.6-sol judge</text>
<rect x="865" y="145" width="210" height="170" rx="20" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<text x="883" y="190" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0f172a">4  Separate</text>
<text x="883" y="235" font-family="Arial, sans-serif" font-size="16" fill="#334155">122 MCQ main leaderboard</text>
<text x="883" y="268" font-family="Arial, sans-serif" font-size="16" fill="#334155">FR · Robustness · Hard50</text>
<rect x="1135" y="145" width="210" height="170" rx="20" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
<text x="1153" y="190" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0f172a">5  Audit</text>
<text x="1153" y="235" font-family="Arial, sans-serif" font-size="16" fill="#334155">manifests + raw outputs</text>
<text x="1153" y="268" font-family="Arial, sans-serif" font-size="16" fill="#334155">item-level failure records</text>
<text x="700" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f766e">Only SGS152 MCQ enters the headline ranking; diagnostic layers are never collapsed into one score.</text>
</svg>
