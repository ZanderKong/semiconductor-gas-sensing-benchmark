name: Validate Benchmark

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate mini-benchmark 0.4.0 dataset
        run: make validate
      - name: Lint benchmark docs and metadata
        run: make lint
      - name: Run local 0.4.0 demo
        run: make demo
      - name: Regenerate report
        run: make report
      - name: Score bundled final MCQ outputs
        run: make score-mcq
